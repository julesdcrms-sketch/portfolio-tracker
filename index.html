<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f7f6f3;color:#1a1a18;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:360px;padding:24px}
.card{background:#fff;border:0.5px solid #e4e2dc;border-radius:16px;padding:40px 36px}
.logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px;color:#1a1a18}
.logo span{color:#b0aea9}
.label{font-size:10px;letter-spacing:.1em;color:#b0aea9;text-transform:uppercase;font-weight:500;margin-bottom:8px;display:block}
.input{width:100%;padding:11px 14px;background:#f7f6f3;border:0.5px solid #e4e2dc;border-radius:8px;font-size:16px;font-family:'DM Mono',monospace;color:#1a1a18;letter-spacing:.2em;outline:none;transition:border-color .15s}
.input:focus{border-color:#9a9890}
.btn{width:100%;margin-top:16px;padding:12px;background:#1a1a18;border:none;border-radius:8px;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;letter-spacing:.04em;transition:opacity .15s}
.btn:hover{opacity:.85}
.error{margin-top:12px;font-size:12px;color:#b83030;text-align:center;height:18px}
.hint{margin-top:24px;font-size:11px;color:#c4c1bb;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">Portfolio <span>/ tracker</span></div>
    <label class="label" for="pwd">Code d'accès</label>
    <input class="input" type="password" id="pwd" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Accéder au dashboard</button>
    <div class="error" id="err"></div>
    <div class="hint">Accès personnel uniquement.</div>
  </div>
</div>
<script>
function login(){
  const pwd=document.getElementById('pwd').value;
  if(pwd==='2503'){
    sessionStorage.setItem('pf_auth','ok');
    window.location.href='dashboard.html';
  } else {
    const err=document.getElementById('err');
    err.textContent='Code incorrect.';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
    setTimeout(()=>err.textContent='',2500);
  }
}
if(sessionStorage.getItem('pf_auth')==='ok') window.location.href='dashboard.html';
</script>
</body>
</html>
